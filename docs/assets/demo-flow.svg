<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" role="img" aria-label="Cmd+K to Plan to Diff to Apply workflow">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a5568"/>
    </marker>
    <style>
      .box { fill: #f7fafc; stroke: #4a5568; stroke-width: 1.5; rx: 8; }
      .title { font: 600 14px system-ui, sans-serif; fill: #1a202c; }
      .sub { font: 12px system-ui, sans-serif; fill: #4a5568; }
      .arrow { stroke: #4a5568; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="box" x="10" y="30" width="140" height="60"/>
  <text class="title" x="80" y="58" text-anchor="middle">Cmd+K</text>
  <text class="sub" x="80" y="76" text-anchor="middle">NL prompt</text>

  <line class="arrow" x1="150" y1="60" x2="178" y2="60"/>

  <rect class="box" x="180" y="30" width="140" height="60"/>
  <text class="title" x="250" y="58" text-anchor="middle">Plan</text>
  <text class="sub" x="250" y="76" text-anchor="middle">JSON steps</text>

  <line class="arrow" x1="320" y1="60" x2="348" y2="60"/>

  <rect class="box" x="350" y="30" width="140" height="60"/>
  <text class="title" x="420" y="58" text-anchor="middle">Diff</text>
  <text class="sub" x="420" y="76" text-anchor="middle">Preview grid</text>

  <line class="arrow" x1="490" y1="60" x2="518" y2="60"/>

  <rect class="box" x="520" y="30" width="140" height="60"/>
  <text class="title" x="590" y="58" text-anchor="middle">Apply</text>
  <text class="sub" x="590" y="76" text-anchor="middle">Write / undo</text>
</svg>
